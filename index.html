<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Trang cá nhân</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #ffeef5;
        }

        .container {
            max-width: 400px;
            margin: auto;
            background: white;
            border-radius: 0;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .header {
            position: relative;
        }

        .header img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .header-text {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: white;
            font-weight: bold;
            background: rgba(255, 105, 180, 0.7);
            padding: 8px 12px;
        }

        .menu {
            display: flex;
            justify-content: space-around;
            padding: 10px;
            color: #ff69b4;
            font-weight: bold;
        }

        .content {
            display: flex;
            padding: 15px;
            align-items: center;
        }

        .avatar {
            width: 120px;
            height: 140px;
            object-fit: cover;
            border-radius: 0;
            border: 3px solid pink;
            margin-right: 15px;
        }

        .info {
            line-height: 1.8;
            font-size: 14px;
        }

        .footer {
            background: #ffb6c1;
            text-align: center;
            padding: 15px;
            font-size: 13px;
        }

        .zalo-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #ff69b4;
            color: white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
        }
    </style>
</head>
<body>

<div class="container">

    <!-- Banner -->
    <div class="header">
        <img src="https://scontent.fuih1-1.fna.fbcdn.net/v/t39.30808-6/548200702_1320174976785502_4217757923454435798_n.jpg?_nc_cat=107&ccb=1-7&_nc_sid=2a1932&_nc_eui2=AeFfHxaS9LzX5uN-AOF3WRVqrm-Y6bSS-Meub5jptJL4x5U4F7xiofNHOw8Q9WNpPuzLPtWvdrRAe5XAXkrrYwXe&_nc_ohc=3ha2U0PmfVIQ7kNvwEaMwXO&_nc_oc=AdoSgBST_THydEtuw23GiRrn7t_Urhy2pEWpgbz4lExzcXlE6HTjuQ3QDi3-uKbSR8nNMMcgbFXViIi08goio_o1&_nc_zt=23&_nc_ht=scontent.fuih1-1.fna&_nc_gid=edsLVGDVCWHiK6yaQuTtcw&_nc_ss=7a3a8&oh=00_Af0LdvbaA2X6ix7n0lNQHUrtIyH35mUSdxEBj9hFxoR5iw&oe=69D43FDD
       ">
        <div class="header-text">
            💖 Trang cá nhân<br>
            Trương Thị Hồng Lai

    <!-- Menu -->
    <div class="menu">
        <div>🌸 Chia sẻ</div>
        <div>📚 Học hỏi</div>
        <div>✨ Sáng tạo</div>
    </div>

    <!-- Nội dung -->
    <div class="content">
        <img class="avatar" src="https://scontent.fuih1-1.fna.fbcdn.net/v/t39.30808-6/631580567_1611831229956290_911203377150062566_n.jpg?_nc_cat=100&ccb=1-7&_nc_sid=1d70fc&_nc_eui2=AeE9vxclSmgPcAbUoeV1k1mr-OdbVXrm8cL451tVeubxwrHUpUco9RGHpyOJKvRUfWmzUNJSeInlQqskK9QL8hWC&_nc_ohc=mbwkLgPfpaYQ7kNvwEykSAp&_nc_oc=Adqh8db9VHN_Ja6fmDbBNSnhu06CV0eNRQ81MQYY7AJAViR22wv8DLESt5DPW5eVfa_kb_HlSYsy5M1glGlMrEkU&_nc_zt=23&_nc_ht=scontent.fuih1-1.fna&_nc_gid=-EyC94gOsLhTxRghKRWY6w&_nc_ss=7a3a8&oh=00_Af1wU5pMHETt1lVG8lmrTthHnWs45JwahjvTbs4r61dd8g&oe=69D42C95
       ">

        <div class="info">
            <p>👤 Tên: Trương Thị Hồng Lai</p>
            <p>🎂 Ngày sinh: 24/10/2008</p>
            <p>🚺 Giới tính: Nữ</p>
            <p>🎨 Sở thích: Vẽ tranh</p>
        </div>
    </div>

    <!-- Footer -->

</div>
